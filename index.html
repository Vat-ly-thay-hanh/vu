<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        Đăng ký học toán thầy Vũ
    </title>

    <link
        rel="stylesheet"
        href="style.css">
<!--
    <script>

        if (
            sessionStorage.getItem(
                "selectedTeacher"
            ) !== "vu"
        ) {
            location.replace("../");
        }

    </script>
-->
</head>

<body>

<div class="container">

    <div class="header">

        <img
            src="images/logo.png"
            alt="Logo"
            class="logo">

        <h1>
            TOÁN THẦY VŨ
        </h1>

        <div class="phone">
            0368884752
        </div>

    </div>

    <div class="card">

        <div class="form-group">

            <label>
                <strong>
                    Chọn lớp *
                </strong>
            </label>

            <select id="lopHoc">

                <option value="">
                    -- Chọn lớp --
                </option>

                <option value="8">
                    Lớp 8
                </option>    

                <option value="9">
                    Lớp 9
                </option>

                <option value="10">
                    Lớp 10
                </option>

                <option value="11">
                    Lớp 11
                </option>

                <option value="12">
                    Lớp 12
                </option>

            </select>

        </div>

        <div
            id="formSection"
            style="display:none;">

            <div class="form-group">

                <label>
                    <strong>
                        Họ và tên học sinh *
                    </strong>
                </label>

                <input
                    type="text"
                    id="hoTen"
                    placeholder="Nhập họ và tên học sinh">

            </div>

            <div class="form-group">

                <label>
                    <strong>
                        Số điện thoại phụ huynh *
                    </strong>
                </label>

                <input
                    type="text"
                    id="sdtPhuHuynh"
                    placeholder="Ví dụ: 0123456789">

            </div>

            <div class="form-group"
                id = "sdtHocSinhGroup">

                <label>
                    <strong>
                        Số điện thoại học sinh *
                    </strong>
                </label>

                <input
                    type="text"
                    id="sdtHocSinh"
                    placeholder="Ví dụ: 0123456789">

            </div>

            <div
                class="form-group"
                id="lienHeHocSinhGroup">

                <label>
                    <strong>
                        Link FB của học sinh *
                    </strong>
                </label>

                <input
                    type="text"
                    id="lienHeHocSinh"
                    placeholder="https://www.facebook.com/vu.mitom">

            </div>

            <div class="form-group">

                <label>
                    <strong>
                        Trường học sinh đang học *
                    </strong>
                </label>

                <select id="truongHoc">
                </select>

            </div>

            <div class="schedule-box">

                <h2>
                    Lịch học
                </h2>

                <img
                    id="scheduleImage"
                    src=""
                    alt="Lịch học">

            </div>

            <div
                id="groupSection"
                style="display:none;">

                <h2 id = "groupTitle">

                </h2>

                <div id="groupTableContainer">
                </div>

            </div>

        </div>

        <div id="message">
        </div>

        <button
            id="submitBtn"
            disabled>

            Đăng ký

        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
